      {
        "imports": {
          "three": "__THREE_BASE__/build/three.module.js",

        }
      }

    <style>
      __VIEWER_STYLE__
    </style>

  <body>
    <canvas id="sg-canvas"></canvas>

    <!-- Title + crawl stats -->
    <section id="sg-hud" class="sg-panel">
      <h1 id="sg-title">Crawl universe</h1>
      <div class="sg-stats" id="sg-stats"></div>
    </section>

    <!-- Controls / help -->
    <section id="sg-help" class="sg-panel" data-collapsed="false">
      <button id="sg-help-toggle" type="button" aria-expanded="true">
        <span aria-hidden="true">&#9737;</span>
        <span id="sg-help-label">Controls</span>
      </button>
      <div id="sg-help-body"></div>
    </section>

    <!-- Status legend -->
    <section id="sg-legend" class="sg-panel"></section>

    <!-- Hover tooltip -->
    <div id="sg-tooltip"></div>

    <!-- Detail panel -->
    <aside id="sg-info" class="sg-panel" data-open="false">
      <div id="sg-info-head">
        <h2 id="sg-info-title"></h2>
        <button id="sg-info-close" type="button" aria-label="Close">&times;</button>
      </div>
      <div id="sg-info-fields"></div>
      <a id="sg-open-page" href="#" target="_blank" rel="noopener noreferrer"></a>
      <div id="sg-preview-wrap">
        <iframe
          id="sg-preview"
          title="Live page preview"
          sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
          referrerpolicy="no-referrer"
          loading="lazy"
        ></iframe>
        <div id="sg-preview-msg"></div>
      </div>
    </aside>

    <script>
      window.__SITE_GRAPH__ = __GRAPH_DATA__;
      window.__VIEWER_LABELS__ = __LABELS__;
      window.__TEXTURE_BASE__ = "__TEXTURE_BASE_URL__";
    </script>
    <script type="module">
      __VIEWER_SCRIPT__
    </script>
  </body>
</html>
